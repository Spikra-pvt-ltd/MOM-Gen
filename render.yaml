services:
  # Python FastAPI Backend
  - type: web
    name: mom-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Set this manually in the Render Dashboard securely

  # Next.js Frontend
  - type: web
    name: mom-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: mom-backend
          envVarKey: RENDER_EXTERNAL_URL
